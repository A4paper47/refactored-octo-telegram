<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>{{ app_name or "Web VO Tracker" }} — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css', v=(app_version ~ '-' ~ build_id)) }}">
</head>
<body>
  <script>
  // Apply saved theme ASAP to avoid flash of wrong theme
  (function(){
    try{
      const saved = localStorage.getItem('theme') || 'default';
      if(saved === 'endfield') document.body.classList.add('theme-endfield');
    }catch(e){}
  })();
  </script>
  <div class="auth-topbar">
    <div class="muted" style="font-family: var(--font-mono); font-size:12px;">SYSTEM</div>
    <select class="theme-select" id="themeSelect" title="Theme">
      <option value="default">Default</option>
      <option value="endfield">Endfield (Light)</option>
    </select>
  </div>
  <div class="wrap auth-wrap">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">
          {% for m in messages %}
            <div>{{ m }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>

  <script>
  (function(){
    const sel = document.getElementById('themeSelect');
    const saved = localStorage.getItem('theme') || 'default';
    if(saved === 'endfield') document.body.classList.add('theme-endfield');
    if(sel){
      sel.value = saved;
      sel.addEventListener('change', ()=>{
        const v = sel.value || 'default';
        document.body.classList.toggle('theme-endfield', v === 'endfield');
        localStorage.setItem('theme', v);
      });
    }
  })();
  </script>
</body>
</html>
