{% extends 'base.html' %}

{% block content %}
  <div class="card">
    <div class="row" style="justify-content:space-between; align-items:center; gap:12px;">
      <div>
        <div class="h1">Readme</div>
        <div class="muted">Quick reference for workflows, commands, and environment variables.</div>
      </div>
      <div class="row" style="gap:10px;">
        <button class="btn btn-secondary btn-sm" type="button" onclick="navigator.clipboard.writeText(document.getElementById('readmeText').innerText)">Copy</button>
        <a class="btn btn-secondary btn-sm" href="{{ url_for('dashboard') }}">Back</a>
      </div>
    </div>
  </div>

  <div class="card" style="margin-top:14px;">
    <pre class="readme" id="readmeText">{{ content }}</pre>
  </div>
{% endblock %}
