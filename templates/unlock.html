{% extends 'auth_base.html' %}
{% block content %}
<div class="auth-shell">
  <div class="auth-hero">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <div>
        <div class="auth-title">Web VO Tracker</div>
        <div class="muted">Panel unlocked access</div>
      </div>
    </div>

    <div class="auth-loader" aria-live="polite">
      <div class="auth-loader-top">
        <span class="muted">SECURITY</span>
        <span class="auth-percent">KEY</span>
      </div>
      <div class="auth-loader-hint muted">Enter the panel key to continue.</div>
    </div>
  </div>

  <div class="card auth-card" style="opacity:1; transform:none;">
    <h2 style="margin-top:0;">Unlock</h2>
    <p class="muted" style="margin-top:-6px;">Login is disabled temporarily. This key protects the panel.</p>

    <form method="post" autocomplete="off">
      <label>Panel key</label>
      <input name="key" type="password" placeholder="••••••••" autofocus required>

      <div class="row" style="margin-top:12px; justify-content: space-between; width:100%;">
        <button type="submit">Unlock</button>
        <span class="muted" style="font-family: var(--font-mono);">LOCKED</span>
      </div>
    </form>

    <div class="muted" style="margin-top:14px; font-family: var(--font-mono); font-size:12px;">
      Set Render ENV: <code>ADMIN_PANEL_KEY</code>
    </div>
  </div>
</div>
{% endblock %}
